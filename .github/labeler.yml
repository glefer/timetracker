# Configuration for actions/labeler

# Documentation changes
docs:
  - changed-files:
    - any-glob-to-any-file: ['**/*.md', 'docs/**/*']

# Configuration changes
config:
  - changed-files:
    - any-glob-to-any-file: 
      - 'deno.json'
      - 'package.json'
      - '.github/**/*'
      - '.releaserc.json'
      - 'commitlint.config.mjs'

# Source code changes
source:
  - changed-files:
    - any-glob-to-any-file: 'src/**/*.ts'

# Test changes
tests:
  - changed-files:
    - any-glob-to-any-file: 'src/**/*.test.ts'

# Infrastructure/Database
infrastructure:
  - changed-files:
    - any-glob-to-any-file: 
      - 'src/infrastructure/**/*'
      - 'src/domain/**/*'

# Views/UI
ui:
  - changed-files:
    - any-glob-to-any-file: 'src/views/**/*'

# Routes/API
api:
  - changed-files:
    - any-glob-to-any-file: 'src/routes/**/*'

# Build system
build:
  - changed-files:
    - any-glob-to-any-file: 
      - 'build.mjs'
      - '.github/workflows/deploy.yml'
